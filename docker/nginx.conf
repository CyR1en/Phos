pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  client_body_temp_path /tmp/nginx_body;
  proxy_temp_path /tmp/nginx_proxy;
  fastcgi_temp_path /tmp/nginx_fastcgi;
  uwsgi_temp_path /tmp/nginx_uwsgi;
  scgi_temp_path /tmp/nginx_scgi;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff2;

  server {
    listen 8080;
    server_name _;

    root /app/dist;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    absolute_redirect off;
    port_in_redirect off;

    location = /admin {
      return 301 /admin/;
    }

    location ~* \.(jpg|jpeg|png|webp|avif|gif|ico|svg|css|js|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location /photos/ {
      alias /app/dist/photos/;
    }

    location /admin/ {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location / {
      try_files $uri $uri.html $uri/index.html /404.html;
      expires -1;
      add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;
    location = /404.html {
      internal;
    }
  }
}
